# ── HTTP: redirect to HTTPS + serve ACME challenges ──────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name fluentica.app;

    # Let's Encrypt / certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main app ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name fluentica.app;

    ssl_certificate     /etc/letsencrypt/live/fluentica.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fluentica.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # Increase timeouts for SSE streaming responses
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;

    # Gzip for non-streaming text assets
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    location / {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;

        # Required for SSE (Server-Sent Events)
        proxy_set_header Connection        "";
        proxy_buffering                    off;
        proxy_cache                        off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
