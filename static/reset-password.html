<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluentica AI — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-logo">
      <span class="logo-icon">🌐</span>
      <h1 class="gradient-text">Fluentica AI</h1>
      <p>Your AI-powered language tutor</p>
    </div>

    <div class="auth-card">
      <div class="alert alert-error" id="authAlert" role="alert"></div>

      <div id="panel-reset">
        <h2 style="margin:0 0 8px;color:var(--text-1);font-size:1.2rem;font-weight:600;">Set a new password</h2>
        <p style="color:var(--text-2);font-size:0.9rem;margin:0 0 24px;">Choose a strong password with at least 8 characters.</p>
        <form class="auth-form" id="resetForm" novalidate>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" placeholder="Min. 8 characters" autocomplete="new-password" required />
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat your password" autocomplete="new-password" required />
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-full" id="resetBtn">
            <span>Update Password</span>
          </button>
        </form>
      </div>

      <div id="panel-done" style="display:none;text-align:center;padding:16px 0 8px;">
        <div style="font-size:3rem;margin-bottom:16px;">✅</div>
        <h3 style="margin:0 0 10px;font-size:1.2rem;color:var(--text-1);">Password updated!</h3>
        <p style="color:var(--text-2);margin:0 0 20px;line-height:1.6;">Your password has been changed. You can now sign in with your new password.</p>
        <a href="/" class="btn btn-primary">Sign In</a>
      </div>
    </div>
  </div>

  <script>
    function showAlert(msg, type) {
      const el = document.getElementById('authAlert');
      el.textContent = msg;
      el.className = 'alert ' + (type === 'success' ? 'alert-success' : 'alert-error') + ' show';
    }

    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      showAlert('Invalid reset link. Please request a new one.');
      document.getElementById('resetForm').style.display = 'none';
    }

    const resetBtn = document.getElementById('resetBtn');
    resetBtn.dataset.label = resetBtn.querySelector('span').textContent;

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('newPassword').value;
      const confirm  = document.getElementById('confirmPassword').value;

      if (password.length < 8) { showAlert('Password must be at least 8 characters.'); return; }
      if (password !== confirm) { showAlert('Passwords do not match.'); return; }

      resetBtn.disabled = true;
      resetBtn.querySelector('span').textContent = 'Please wait…';
      try {
        const res  = await fetch('/api/auth/reset-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          showAlert(data.error || 'Failed to reset password.');
        } else {
          document.getElementById('panel-reset').style.display = 'none';
          document.getElementById('panel-done').style.display  = '';
          document.getElementById('authAlert').classList.remove('show');
        }
      } catch (err) {
        showAlert(err.message || 'Something went wrong.');
      } finally {
        resetBtn.disabled = false;
        resetBtn.querySelector('span').textContent = resetBtn.dataset.label;
      }
    });
  </script>
</body>
</html>
