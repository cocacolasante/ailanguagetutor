<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing Coach — LinguaAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css?v=4" />
  <style>
    /* ── Writing Coach specific styles ────────────────────────────── */
    .writing-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .writing-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px 16px;
      overflow: hidden;
    }

    .writing-header {
      padding: 16px 0 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .writing-header h2 {
      margin: 0 0 4px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .writing-header p {
      margin: 0;
      font-size: 0.85rem;
      color: var(--text-2);
    }

    .writing-header-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .conv-timer {
      font-size: 0.85rem;
      color: var(--text-2);
      font-variant-numeric: tabular-nums;
    }

    .writing-thread {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Reuse conversation message styles */
    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      background: var(--surface-2);
    }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .message.assistant .msg-bubble {
      background: var(--surface-2);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    .message.user .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 0.7rem;
      color: var(--text-3);
      padding: 0 4px;
    }

    .message.user .msg-time {
      text-align: right;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 12px 16px;
      background: var(--surface-2);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-3);
      animation: typingBounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Misspelling highlight */
    .misspelling-highlight {
      text-decoration: underline wavy #f87171;
      text-underline-offset: 3px;
      cursor: help;
    }

    /* Input row */
    .writing-input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .writing-textarea {
      flex: 1;
      padding: 10px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.4;
      resize: none;
      min-height: 42px;
      max-height: 140px;
      overflow-y: auto;
      outline: none;
      transition: border-color 0.2s;
    }

    .writing-textarea:focus {
      border-color: var(--accent);
    }

    .writing-textarea::placeholder {
      color: var(--text-3);
    }

    .writing-send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1rem;
      transition: opacity 0.2s;
    }

    .writing-send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .writing-end-row {
      display: flex;
      justify-content: center;
      padding-top: 10px;
      flex-shrink: 0;
    }

    /* Loading state */
    .writing-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex: 1;
      color: var(--text-2);
    }

    /* AI message action buttons */
    .msg-actions {
      display: flex;
      gap: 6px;
      padding: 2px 4px;
    }

    .msg-action-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-2);
      font-size: 0.72rem;
      padding: 2px 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .msg-action-btn:hover {
      background: var(--surface-2);
      color: var(--text-primary);
    }

    .msg-action-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .msg-translation {
      font-size: 0.82rem;
      color: var(--text-2);
      font-style: italic;
      padding: 4px 14px 6px;
      border-left: 2px solid var(--border);
      margin-top: 2px;
    }

    @media (max-width: 600px) {
      .writing-main {
        padding: 0 12px 12px;
      }
      .message {
        max-width: 92%;
      }
    }
  </style>
</head>
<body class="writing-page">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">
      <a href="/dashboard.html" class="logo-link">
        <span class="logo-icon">🌐</span>
        <span class="logo-text">LinguaAI</span>
      </a>
    </div>
    <div class="navbar-right">
      <a href="/dashboard.html" class="btn btn-ghost btn-sm">← Dashboard</a>
    </div>
  </nav>

  <!-- Main writing area -->
  <main class="writing-main">

    <!-- Loading state -->
    <div class="writing-loading" id="loadingState">
      <div class="spinner"></div>
      <p>Starting writing session…</p>
    </div>

    <!-- Chat container (hidden until session loads) -->
    <div id="chatContainer" class="hidden" style="flex:1;display:flex;flex-direction:column;overflow:hidden">

      <!-- Header -->
      <div class="writing-header">
        <div class="writing-header-meta">
          <div>
            <h2>✍️ Writing Coach</h2>
            <p id="headerSub">Loading…</p>
          </div>
          <div class="conv-timer" id="timerDisplay">0:00</div>
        </div>
      </div>

      <!-- Message thread -->
      <div class="writing-thread" id="messagesContainer"></div>

      <!-- Input row -->
      <div class="writing-input-row">
        <textarea
          id="msgInput"
          class="writing-textarea"
          placeholder="Type your reply…"
          rows="1"
        ></textarea>
        <button class="writing-send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
          ➤
        </button>
      </div>

      <!-- End session -->
      <div class="writing-end-row">
        <button class="btn btn-danger btn-sm" onclick="endSession()">End &amp; Get Summary</button>
      </div>

    </div>

  </main>

  <script src="/js/api.js?v=14"></script>
  <script src="/js/writing.js?v=2"></script>
</body>
</html>
